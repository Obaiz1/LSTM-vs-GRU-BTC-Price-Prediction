name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lightweight CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Python syntax check (compile core modules)
        run: |
          python -m py_compile \
            app.py \
            data_pipeline.py \
            models.py \
            src/preprocessing.py \
            src/prediction_utils.py \
            training/train_v1_lstm.py \
            training/train_v2_gru.py \
            deployment/api.py

      - name: Lint with ruff (non-blocking style report)
        run: ruff check . || true

      - name: Check Dockerfile exists
        run: test -f Dockerfile && echo "Dockerfile found"

      - name: Check Kubernetes manifests exist
        run: |
          test -f kubernetes/deployment.yaml && echo "deployment.yaml found"
          test -f kubernetes/service.yaml && echo "service.yaml found"

      - name: Validate YAML files
        run: |
          python - <<'PY'
          import sys, glob, yaml
          files = (
              glob.glob("kubernetes/*.yaml")
              + glob.glob(".github/workflows/*.yml")
              + ["docker-compose.yml"]
          )
          ok = True
          for f in files:
              try:
                  with open(f) as fh:
                      list(yaml.safe_load_all(fh))
                  print(f"OK   {f}")
              except Exception as exc:
                  ok = False
                  print(f"FAIL {f}: {exc}")
          sys.exit(0 if ok else 1)
          PY

      - name: Run lightweight tests (project structure)
        run: pytest tests/test_project_structure.py -q
