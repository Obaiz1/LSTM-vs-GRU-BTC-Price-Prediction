apiVersion: apps/v1
kind: Deployment
metadata:
  name: btc-price-api
  labels:
    app: btc-price-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: btc-price-api
  template:
    metadata:
      labels:
        app: btc-price-api
    spec:
      containers:
        - name: btc-price-api
          # Image is built directly into Minikube's Docker daemon, so do not pull.
          image: btc-price-final:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1536Mi"
